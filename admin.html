<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #f0f0f5; min-height: 100vh; }
        nav { padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: 1.2rem; background: linear-gradient(135deg, #ff4444, #e040fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: rgba(240,240,245,0.6); text-decoration: none; font-size: 0.9rem; }
        .nav-links a:hover { color: #f0f0f5; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1 { font-family: 'Unbounded'; font-size: 1.5rem; margin-bottom: 24px; color: #ff4444; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-num { font-family: 'Unbounded'; font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #6c3ce0, #00e5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.8rem; color: rgba(240,240,245,0.5); margin-top: 4px; }
        .section { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .section h2 { font-family: 'Unbounded'; font-size: 1.1rem; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        th { color: rgba(240,240,245,0.5); font-size: 0.8rem; text-transform: uppercase; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Inter'; font-size: 0.8rem; }
        .btn-danger { background: rgba(255,68,68,0.2); color: #ff4444; border: 1px solid rgba(255,68,68,0.3); }
        .btn-danger:hover { background: rgba(255,68,68,0.4); }
        .btn-warn { background: rgba(255,200,0,0.2); color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
        .btn-warn:hover { background: rgba(255,200,0,0.4); }
        .btn-ok { background: rgba(0,229,255,0.2); color: #00e5ff; border: 1px solid rgba(0,229,255,0.3); }
        .btn-ok:hover { background: rgba(0,229,255,0.4); }
        .role-badge { padding: 2px 8px; border-radius: 100px; font-size: 0.75rem; }
        .role-badge.user { background: rgba(108,60,224,0.2); color: #6c3ce0; }
        .role-badge.admin { background: rgba(255,68,68,0.2); color: #ff4444; }
        .role-badge.banned { background: rgba(255,100,100,0.2); color: #ff6464; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">ДК Админ</a>
        <ul class="nav-links">
            <li><a href="/">Главная</a></li>
            <li><a href="/profile.html">Профиль</a></li>
            <li><a href="/api/logout">Выйти</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>Панель администратора</h1>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-num" id="statViews">0</div><div class="stat-label">Просмотров</div></div>
            <div class="stat-card"><div class="stat-num" id="statUsers">0</div><div class="stat-label">Пользователей</div></div>
            <div class="stat-card"><div class="stat-num" id="statComments">0</div><div class="stat-label">Комментариев</div></div>
        </div>

        <div class="section">
            <h2>Пользователи</h2>
            <table>
                <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Роль</th><th>Последний вход</th><th>Действия</th></tr></thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </div>
    <script>
        async function load() {
            const me = await (await fetch('/api/me')).json();
            if (!me.loggedIn || me.role !== 'admin') { window.location.href = '/'; return; }

            const stats = await (await fetch('/api/stats')).json();
            document.getElementById('statViews').textContent = stats.page_views;
            document.getElementById('statUsers').textContent = stats.users;
            document.getElementById('statComments').textContent = stats.comments;

            const users = await (await fetch('/api/admin/users')).json();
            document.getElementById('usersTable').innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td><span class="role-badge ${u.role}">${u.role}</span></td>
                    <td>${u.last_login ? new Date(u.last_login).toLocaleString('ru') : '-'}</td>
                    <td>
                        ${u.role === 'user' ? `<button class="btn btn-warn" onclick="setRole(${u.id},'banned')">Забанить</button>` : ''}
                        ${u.role === 'banned' ? `<button class="btn btn-ok" onclick="setRole(${u.id},'user')">Разбанить</button>` : ''}
                        ${u.role === 'user' ? `<button class="btn btn-ok" onclick="setRole(${u.id},'admin')">В админы</button>` : ''}
                        ${u.role !== 'admin' ? `<button class="btn btn-danger" onclick="delUser(${u.id})">Удалить</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function setRole(id, role) {
            await fetch(`/api/admin/users/${id}/role`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role })
            });
            load();
        }

        async function delUser(id) {
            if (!confirm('Удалить пользователя?')) return;
            await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
            load();
        }

        load();
    </script>
</body>
</html>
